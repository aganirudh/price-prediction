# ──────────────────────────────────────────────────────
# Cost model parameters
# ──────────────────────────────────────────────────────
cost_models:
  equity_options:
    brokerage_per_order: 20.0      # flat ₹20 per order (discount broker)
    stt_on_sell: 0.0005            # 0.05% on sell side premium
    stt_on_exercise: 0.00125       # 0.125% of intrinsic value on exercise — THE STT TRAP
    sebi_charges: 0.000001         # ₹10 per crore
    exchange_txn_charges: 0.00053  # NSE charges 0.053% on premium turnover
    gst: 0.18                      # 18% on brokerage + exchange + SEBI
    stamp_duty: 0.00003            # 0.003% on buy side
    slippage_bps: 5.0              # average slippage in basis points
  commodity_futures:
    brokerage_per_order: 20.0
    ctt: 0.0001                    # 0.01% commodity transaction tax
    sebi_charges: 0.000001
    exchange_txn_charges: 0.00026  # MCX charges
    gst: 0.18
    stamp_duty: 0.00002
    slippage_bps: 8.0

# ──────────────────────────────────────────────────────
# Risk limits
# ──────────────────────────────────────────────────────
risk_limits:
  max_positions: 5
  max_capital_per_trade: 200000.0   # ₹2 lakh per trade
  max_daily_loss: 50000.0           # ₹50,000 daily loss limit
  max_holding_seconds: 300          # 5 minute max hold for arb positions
  initial_capital: 1000000.0        # ₹10 lakh starting capital

# ──────────────────────────────────────────────────────
# Feed configuration
# ──────────────────────────────────────────────────────
feed:
  mock:
    underlyings: ["NIFTY"]
    session_duration_minutes: 375   # 9:15 to 15:30
    tick_interval_seconds: 3
    violation_rate_per_session: 8
    initial_spots:
      NIFTY: 22000.0
      BANKNIFTY: 47000.0
      CRUDEOIL: 6500.0
  live:
    poll_interval_min: 2.5
    poll_interval_max: 3.5
    staleness_threshold_seconds: 10
    session_cookie_refresh_minutes: 5
  historical:
    speed_multiplier: 60.0
    cache_dir: "data/historical/cache"
    lookback_days: 90

# ──────────────────────────────────────────────────────
# Training configuration
# ──────────────────────────────────────────────────────
training:
  model_name: "unsloth/Qwen2.5-1.5B-Instruct"
  quantization: "4bit"
  num_generations: 6
  max_prompt_length: 1024
  max_completion_length: 120
  learning_rate: 0.000002
  gradient_clip: 1.0
  schedule: "cosine"
  lora_r: 16
  lora_alpha: 16
  wandb_project: "pcp-arb-rl"
  checkpoint_interval: 100
  ensemble_device: "cuda"
  llm_device: "cuda"

# ──────────────────────────────────────────────────────
# Curriculum stages
# ──────────────────────────────────────────────────────
curriculum:
  stages:
    - name: "OBVIOUS"
      step_range: [0, 500]
      violation_pct_range: [1.0, 3.0]
      violation_duration_range: [120, 180]
      underlyings: ["NIFTY"]
      num_strikes: 3
      fast_forward_to_violation: true
      feed_type: "mock"
    - name: "MODERATE"
      step_range: [500, 1500]
      violation_pct_range: [0.5, 1.0]
      violation_duration_range: [60, 120]
      underlyings: ["NIFTY", "BANKNIFTY"]
      num_strikes: 10
      fast_forward_to_violation: false
      feed_type: "mock"
    - name: "REALISTIC"
      step_range: [1500, 3000]
      violation_pct_range: [0.3, 0.8]
      violation_duration_range: [30, 90]
      underlyings: ["NIFTY", "BANKNIFTY", "CRUDEOIL"]
      num_strikes: 20
      fast_forward_to_violation: false
      feed_type: "mixed"
    - name: "LIVE_SIM"
      step_range: [3000, 999999]
      violation_pct_range: [0.1, 0.5]
      violation_duration_range: [15, 60]
      underlyings: ["NIFTY", "BANKNIFTY", "CRUDEOIL"]
      num_strikes: 30
      fast_forward_to_violation: false
      feed_type: "live_or_historical"
